steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/sauti-ya-mwananchi/sauti-ya-mwananchi:$SHORT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/sauti-ya-mwananchi/sauti-ya-mwananchi:$SHORT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'sauti-ya-mwananchi'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/sauti-ya-mwananchi/sauti-ya-mwananchi:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1,GOOGLE_GENAI_USE_VERTEXAI=TRUE'
      - '--set-secrets=AT_API_KEY=at-api-key:latest,AT_USERNAME=at-username:latest'
